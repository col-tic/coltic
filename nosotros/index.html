<script>
  document.addEventListener("DOMContentLoaded", () => {
    const portada = document.getElementById("portada");
    let index = 1;
    const total = 3; 

    setInterval(() => {
      
      portada.classList.add("fade-out");

      setTimeout(() => {
        index = index < total ? index + 1 : 1;
        portada.src = `images/portada-${index}.webp`;

        
        portada.classList.remove("fade-out");
      }, 1000); 
    }, 4000); 
  });
</script></header>

<style>
  .footer-grid {

  .horizontal-links {

  .view-all {
    position: relative;
    border-radius: 20px;
    color: white;
    border: 1px solid white;
    width: fit-content;
    margin: 0 auto;
    padding: 0.5rem 1rem;
    display: block;
    overflow: hidden;
    z-index: 1;
    transition: color 0.3s ease, border 0.3s ease;
  }

  .view-all::before {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 0%;
    background-color: rgb(30, 190, 230);
    z-index: -1;
    transition: height 0.4s ease;
  }

  .view-all:hover::before {
    height: 100%;
  }

  .view-all:hover {
    color: black;
    border-color: rgb(30, 190, 230);
  }

  .social-icons {

  .social-icons img {
    width: 32px;
    height: 32px;
    filter: brightness(0) invert(1);  
    transition: transform 0.3s ease, filter 0.3s ease;
  }

  .social-icons img:hover {
    transform: scale(1.2);
    filter: brightness(0) invert(0);  
  }

   
  @media (max-width: 768px) {
    .footer-grid {

      gap: 1.5rem;
    }
  }
</style>

<script>
  function copyToClipboard(text, el) {
    navigator.clipboard.writeText(text).then(() => {
      const original = el.textContent;
      el.textContent = "Copiado";
      setTimeout(() => {
        el.textContent = original;
      }, 1500);
    });
  }
</script>
